<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a14;min-height:100vh;font-family:Arial,sans-serif;padding:16px;}
.header{text-align:center;padding:16px 0 20px;}
.school{color:#7c3aed;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
.brand{color:white;font-size:14px;font-weight:700;letter-spacing:1px;}
.card{background:#13132a;border-radius:16px;overflow:hidden;margin-bottom:12px;border:1px solid #2a2a4a;}
.card-img{width:100%;height:auto;max-height:220px;object-fit:contain;background:#0d0d1f;}
.card-body{padding:20px;}
.badge{display:inline-block;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:700;margin-bottom:8px;}
.Matemática{background:#1a1a4a;color:#6366f1;}
.CienciayTecnología{background:#0d2a1a;color:#22c55e;}
.Comunicación{background:#2a1a0d;color:#f59e0b;}
.grado{background:#1a1a2a;color:#888;margin-left:6px;}
.titulo{color:white;font-size:20px;font-weight:700;margin-bottom:12px;line-height:1.3;}
.divider{height:1px;background:#2a2a4a;margin:12px 0;}
.section-label{color:#7c3aed;font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;}
.desc{color:#aaa;font-size:13px;line-height:1.7;margin-bottom:16px;}
.contenido{color:#ccc;font-size:13px;line-height:1.8;}
.footer{text-align:center;color:#444;font-size:10px;margin-top:24px;padding-bottom:16px;}
.loading{color:#888;text-align:center;padding:40px;font-size:14px;}
</style>
</head>
<body>
<div class="header">
  <div class="school">I.E. Pedro Emilio Paulet Mostajo</div>
  <div class="brand">⚡ NOVA QR</div>
</div>

<div id="contenido">
  <div class="loading">Cargando información...</div>
</div>

<div class="footer">Nova QR • Biblioteca Digital</div>

<script>
const imagenes = {
  mat001: 'https://xdarwinarevalo-beep.github.io/nova/mat.jpg',
  cyt001: 'https://xdarwinarevalo-beep.github.io/nova/cyt.jpg',
  com001: 'https://xdarwinarevalo-beep.github.io/nova/com.jpg'
};

const id = new URLSearchParams(window.location.search).get('id') || 'mat001';
const base = 'https://nova-qr-facf5-default-rtdb.firebaseio.com/';
const curso_key = {
  'Matemática':'Matemática',
  'Ciencia y Tecnología':'CienciayTecnología',
  'Comunicación':'Comunicación'
};

fetch(base + 'temas/' + id + '.json')
  .then(r => r.json())
  .then(data => {
    if(!data){
      document.getElementById('contenido').innerHTML = '<div class="loading">No se encontró información.</div>';
      return;
    }
    const img = imagenes[id] || '';
    const badge = curso_key[data.curso] || 'Matemática';
    document.getElementById('contenido').innerHTML = `
      <div class="card">
        ${img ? `<img class="card-img" src="${img}" alt="${data.titulo}">` : ''}
        <div class="card-body">
          <span class="badge ${badge}">${data.curso}</span>
          <span class="badge grado">${data.grado}</span>
          <div class="titulo">${data.titulo}</div>
          <div class="divider"></div>
          <div class="section-label">Descripción</div>
          <div class="desc">${data.descripcion}</div>
          <div class="divider"></div>
          <div class="section-label">Contenido</div>
          <div class="contenido">${data.contenido}</div>
        </div>
      </div>
    `;
  })
  .catch(()=>{
    document.getElementById('contenido').innerHTML = '<div class="loading">Error al cargar.</div>';
  });
</script>
</body>
</html>
