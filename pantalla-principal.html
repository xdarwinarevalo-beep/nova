<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0a14;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:Arial,sans-serif;padding:24px;}
.logo{width:160px;height:160px;border-radius:50%;margin:0 auto 24px;display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(124,58,237,0.6);}
.logo img{width:100%;height:100%;border-radius:50%;object-fit:cover;}
h1{color:white;font-size:28px;font-weight:900;text-align:center;margin-bottom:8px;letter-spacing:2px;}
.sub{color:#888;font-size:14px;text-align:center;margin-bottom:32px;line-height:1.6;}
.divider{width:60px;height:2px;background:linear-gradient(90deg,#7c3aed,#2563eb);margin:0 auto 32px;border-radius:2px;}
.desc{color:#666;font-size:13px;text-align:center;margin-bottom:40px;line-height:1.8;}
.btn{display:block;width:100%;max-width:280px;background:linear-gradient(135deg,#7c3aed,#2563eb);color:white;border:none;padding:16px;border-radius:30px;font-size:16px;font-weight:700;text-align:center;letter-spacing:1px;box-shadow:0 8px 24px rgba(124,58,237,0.4);}
.version{color:#444;font-size:11px;margin-top:24px;}
</style>
</head>
<body>
<div class="logo">
  <img src="https://xdarwinarevalo-beep.github.io/nova/logo.jpg" alt="Nova QR">
</div>
<h1>NOVA QR</h1>
<div class="divider"></div>
<p class="sub">Escanea y descubre información al instante</p>
<p class="desc">Apunta tu cámara a cualquier<br>código QR para obtener<br>información detallada</p>
<button class="btn" onclick="window.location.href='https://xdarwinarevalo-beep.github.io/nova/pantalla-principal.html#escanear'">Empezar a escanear</button>
<p class="version">v1.0 • Nova QR</p>
</body>
</html>
